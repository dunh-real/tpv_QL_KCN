
services:
  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: rag_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Redis
  redis:
    image: redis:alpine
    container_name: rag_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # FastAPI
  api:
    build: .
    container_name: api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  # Celery Worker
  worker:
    build: .
    container_name: worker
    command: celery -A src.worker.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - mongodb
      - redis
      - api
    restart: unless-stopped

volumes:
  mongodb_data: