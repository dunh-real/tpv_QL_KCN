
services:
  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Redis
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Qdrant
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_db
    ports:
      - "6333:6333"
    environment:
      - QDRANT__SERVICE__API_KEY=ql_kcn
    volumes:
      - qdrant_data:/qdrant/storage:z
    restart: unless-stopped

volumes:
  mongodb_data:
  qdrant_data: